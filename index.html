<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 식단</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f8f7f4; color: #1a1a1a; }
    button { cursor: pointer; font-family: inherit; }
    button:hover { opacity: 0.85; }
    input, textarea { font-family: inherit; }
    .spinner { width:32px; height:32px; border:3px solid #eee; border-top-color:#6366f1; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, Fragment } = React;

const DEFAULT_INGREDIENT_TAGS = ["소고기","돼지고기","닭고기","해산물","두부/달걀","채소","기타재료"];
const DEFAULT_COOKING_TAGS = ["구이","볶음","튀김","찜/조림","국/찌개","면류","밥/덮밥","카레","날것/샐러드","빵/기타"];
const MEAL_TYPES = ["아침","점심","저녁"];
const DAYS = ["월","화","수","목","금","토","일"];

function getWeekDates(weekOffset) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1) + weekOffset * 7;
  const monday = new Date(now.getFullYear(), now.getMonth(), diff);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function fmt(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function dkey(d) { return d.toISOString().split("T")[0]; }

function Tag({ label, color }) {
  const colors = { green: { background:"#f0fdf4", color:"#16a34a" }, blue: { background:"#dbeafe", color:"#1d4ed8" } };
  return <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20, fontWeight:600, ...colors[color||"green"] }}>{label}</span>;
}

function App() {
  const [tab, setTab] = useState("planner");
  const [recipes, setRecipes] = useState([]);
  const [fridge, setFridge] = useState([]);
  const [mealPlan, setMealPlan] = useState({});
  const [ingTags, setIngTags] = useState(DEFAULT_INGREDIENT_TAGS);
  const [cookTags, setCookTags] = useState(DEFAULT_COOKING_TAGS);
  const [weekOffset, setWeekOffset] = useState(0);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    try {
      ["recipes","fridge","mealPlan","ingTags","cookTags"].forEach(k => {
        const v = localStorage.getItem(k);
        if (v) ({ recipes:setRecipes, fridge:setFridge, mealPlan:setMealPlan, ingTags:setIngTags, cookTags:setCookTags })[k](JSON.parse(v));
      });
    } catch {}
  }, []);

  useEffect(() => { localStorage.setItem("recipes", JSON.stringify(recipes)); }, [recipes]);
  useEffect(() => { localStorage.setItem("fridge", JSON.stringify(fridge)); }, [fridge]);
  useEffect(() => { localStorage.setItem("mealPlan", JSON.stringify(mealPlan)); }, [mealPlan]);
  useEffect(() => { localStorage.setItem("ingTags", JSON.stringify(ingTags)); }, [ingTags]);
  useEffect(() => { localStorage.setItem("cookTags", JSON.stringify(cookTags)); }, [cookTags]);

  const notify = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),2500); };

  const w0 = getWeekDates(weekOffset);
  const w1 = getWeekDates(weekOffset + 1);
  const allDates = [...w0, ...w1];

  return (
    <div style={{ minHeight:"100vh" }}>
      {toast && (
        <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", color:"#fff", padding:"10px 24px", borderRadius:24, zIndex:9999, fontSize:14, fontWeight:600, boxShadow:"0 4px 20px rgba(0,0,0,.15)", background: toast.type==="error"?"#ef4444":"#22c55e", whiteSpace:"nowrap" }}>
          {toast.msg}
        </div>
      )}
      <header style={{ background:"#fff", borderBottom:"1px solid #e5e5e5", padding:"0 16px", display:"flex", alignItems:"center", justifyContent:"space-between", height:56, position:"sticky", top:0, zIndex:100 }}>
        <div style={{ fontWeight:800, fontSize:16 }}>🍳 나의 식단</div>
        <nav style={{ display:"flex", gap:4 }}>
          {[["planner","📅 식단표"],["recipes","📖 레시피"],["fridge","🧊 냉장고"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{ padding:"6px 10px", borderRadius:20, border:"none", fontSize:12, fontWeight:600, background:tab===k?"#1a1a1a":"transparent", color:tab===k?"#fff":"#666" }}>{l}</button>
          ))}
        </nav>
      </header>
      <main style={{ maxWidth:900, margin:"0 auto", padding:"20px 12px" }}>
        {tab==="planner" && <Planner recipes={recipes} mealPlan={mealPlan} setMealPlan={setMealPlan} weeks={[w0,w1]} allDates={allDates} weekOffset={weekOffset} setWeekOffset={setWeekOffset} fridge={fridge} notify={notify} />}
        {tab==="recipes" && <Recipes recipes={recipes} setRecipes={setRecipes} ingTags={ingTags} setIngTags={setIngTags} cookTags={cookTags} setCookTags={setCookTags} notify={notify} />}
        {tab==="fridge" && <Fridge fridge={fridge} setFridge={setFridge} notify={notify} />}
      </main>
    </div>
  );
}

function Planner({ recipes, mealPlan, setMealPlan, weeks, allDates, weekOffset, setWeekOffset, fridge, notify }) {
  const [suggestions, setSuggestions] = useState(null);
  const [target, setTarget] = useState(null);
  const [picker, setPicker] = useState(null);
  const [pickerSearch, setPickerSearch] = useState("");

  const getMeal = (d, meal) => mealPlan[dkey(d)]?.[meal] || "";
  const setMeal = (d, meal, val) => {
    const k = dkey(d);
    setMealPlan(p => ({ ...p, [k]: { ...(p[k]||{}), [meal]: val } }));
  };

  const suggest = (d, meal) => {
    if (!recipes.length) return notify("레시피를 먼저 추가해주세요!", "error");
    const k = dkey(d);
    const dayMeals = mealPlan[k] || {};

    // 이번 주 사용된 메뉴
    const weekStart = dkey(weeks[0][0]);
    const weekEnd = dkey(weeks[0][6]);
    const usedThisWeek = new Set(
      Object.entries(mealPlan)
        .filter(([date]) => date >= weekStart && date <= weekEnd)
        .flatMap(([, meals]) => Object.values(meals))
        .filter(Boolean)
    );

    // 오늘 사용된 태그
    const todayIngTags = new Set(Object.values(dayMeals).map(name => recipes.find(r=>r.name===name)?.ingTag).filter(Boolean));
    const todayCookTags = new Set(Object.values(dayMeals).map(name => recipes.find(r=>r.name===name)?.cookTag).filter(Boolean));

    // 최근 2주 사용 빈도
    const recentNames = Object.values(mealPlan).flatMap(meals => Object.values(meals)).filter(Boolean);
    const freq = {};
    recentNames.forEach(n => { freq[n] = (freq[n]||0) + 1; });

    const candidates = recipes.filter(r => {
      if (usedThisWeek.has(r.name)) return false;
      if (r.ingTag && todayIngTags.has(r.ingTag)) return false;
      if (r.cookTag && todayCookTags.has(r.cookTag)) return false;
      return true;
    }).sort((a,b) => (freq[a.name]||0) - (freq[b.name]||0));

    if (!candidates.length) {
      // 규칙 완화해서 이번 주 제외만 적용
      const fallback = recipes.filter(r => !usedThisWeek.has(r.name)).slice(0,3);
      setSuggestions({ suggestions: fallback.map(r=>r.name), reason: "조건에 맞는 메뉴가 부족해서 비슷한 메뉴로 추천했어요" });
    } else {
      setSuggestions({ suggestions: candidates.slice(0,3).map(r=>r.name), reason: "이번 주 안 먹은 메뉴, 오늘 태그 안 겹치는 메뉴로 골랐어요" });
    }
    setTarget({d,meal});
  };

  const apply = (name) => {
    if (target) setMeal(target.d, target.meal, name);
    setSuggestions(null); setTarget(null);
    notify(`${name} 추가됐어요!`);
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <button onClick={()=>setWeekOffset(w=>w-2)} style={{ padding:"6px 14px", borderRadius:8, border:"1px solid #ddd", background:"#fff", fontSize:13 }}>← 이전</button>
        <span style={{ fontWeight:700, fontSize:14 }}>{fmt(allDates[0])} – {fmt(allDates[13])}</span>
        <button onClick={()=>setWeekOffset(w=>w+2)} style={{ padding:"6px 14px", borderRadius:8, border:"1px solid #ddd", background:"#fff", fontSize:13 }}>다음 →</button>
      </div>

      {weeks.map((week, wi) => (
        <div key={wi} style={{ marginBottom:24 }}>
          <div style={{ fontSize:13, fontWeight:700, color:"#888", marginBottom:6 }}>{wi===0?"이번주":"다음주"} ({fmt(week[0])} ~ {fmt(week[6])})</div>
          <div style={{ display:"grid", gridTemplateColumns:"40px repeat(7,1fr)", gap:1, background:"#ddd", borderRadius:10, overflow:"hidden" }}>
            <div style={{ background:"#f0eeeb" }}></div>
            {week.map((d,i) => (
              <div key={i} style={{ background:"#f0eeeb", padding:"6px 2px", textAlign:"center" }}>
                <div style={{ fontSize:12, fontWeight:700 }}>{DAYS[i]}</div>
                <div style={{ fontSize:10, color:"#888" }}>{fmt(d)}</div>
              </div>
            ))}
            {MEAL_TYPES.map(meal => (
              <Fragment key={meal}>
                <div style={{ background:"#f0eeeb", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:"#666", padding:2 }}>{meal}</div>
                {week.map((d,i) => {
                  const val = getMeal(d, meal);
                  return (
                    <div key={i} style={{ background:"#fff", padding:3, minHeight:48, display:"flex", flexDirection:"column", gap:2 }}>
                      <div onClick={()=>{ setPicker({d,meal}); setPickerSearch(""); }} style={{ flex:1, cursor:"pointer", borderRadius:4, padding:"2px 4px", display:"flex", alignItems:"center" }}>
                          {val ? <span style={{ fontSize:10, lineHeight:1.3, wordBreak:"keep-all" }}>{val}</span>
                               : <span style={{ fontSize:16, color:"#ddd", margin:"auto" }}>+</span>}
                        </div>
                      <button onClick={()=>suggest(d,meal)} style={{ fontSize:11, border:"none", background:"transparent", padding:0, opacity:0.4, alignSelf:"flex-end" }} title="AI 추천">✨</button>
                    </div>
                  );
                })}
              </Fragment>
            ))}
          </div>
        </div>
      ))}

      {picker && (
        <div onClick={()=>setPicker(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:1000 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20, width:"100%", maxWidth:500, maxHeight:"70vh", display:"flex", flexDirection:"column" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <div style={{ fontSize:16, fontWeight:800 }}>레시피 선택</div>
              <button onClick={()=>setPicker(null)} style={{ border:"none", background:"transparent", fontSize:20, color:"#aaa" }}>×</button>
            </div>
            <input autoFocus value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)}
              placeholder="🔍 검색..."
              style={{ padding:"10px 12px", border:"1px solid #ddd", borderRadius:10, fontSize:14, outline:"none", marginBottom:12 }} />
            <div style={{ overflowY:"auto", display:"flex", flexDirection:"column", gap:8 }}>
              {recipes.filter(r=>r.name.toLowerCase().includes(pickerSearch.toLowerCase())).map((r,i)=>(
                <button key={i} onClick={()=>{ setMeal(picker.d, picker.meal, r.name); setPicker(null); notify(`${r.name} 등록됐어요!`); }}
                  style={{ padding:"12px 14px", background:"#f8f7f4", border:"1px solid #eee", borderRadius:10, textAlign:"left", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontWeight:600, fontSize:14 }}>{r.name}</span>
                  <div style={{ display:"flex", gap:4 }}>
                    {r.ingTag && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#f0fdf4", color:"#16a34a", fontWeight:600 }}>{r.ingTag}</span>}
                    {r.cookTag && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#dbeafe", color:"#1d4ed8", fontWeight:600 }}>{r.cookTag}</span>}
                  </div>
                </button>
              ))}
              {recipes.filter(r=>r.name.toLowerCase().includes(pickerSearch.toLowerCase())).length === 0 && (
                <div style={{ textAlign:"center", padding:"30px 0", color:"#aaa" }}>레시피가 없어요</div>
              )}
            </div>
            <button onClick={()=>{ setMeal(picker.d, picker.meal, ""); setPicker(null); notify("비웠어요"); }}
              style={{ marginTop:12, padding:10, border:"1px solid #fca5a5", borderRadius:10, background:"#fff", fontSize:13, color:"#ef4444" }}>
              🗑 비우기
            </button>
          </div>
        </div>
      )}

      {suggestions && (
        <div onClick={()=>{setSuggestions(null);setTarget(null);}} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.4)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:16, padding:24, width:300, maxWidth:"90vw" }}>
            <div style={{ fontSize:18, fontWeight:800, marginBottom:12 }}>✨ 추천 메뉴</div>
            {suggestions && (
              <>
                <p style={{ fontSize:12, color:"#888", marginBottom:12, lineHeight:1.5 }}>{suggestions.reason}</p>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {(suggestions.suggestions||[]).map(name=>(
                    <button key={name} onClick={()=>apply(name)} style={{ padding:"12px 16px", background:"#f8f7f4", border:"1px solid #e5e5e5", borderRadius:10, textAlign:"left", fontSize:14, fontWeight:600 }}>🍽 {name}</button>
                  ))}
                </div>
                <button onClick={()=>{setSuggestions(null);setTarget(null);}} style={{ marginTop:16, width:"100%", padding:10, border:"1px solid #ddd", borderRadius:8, background:"#fff", fontSize:14 }}>닫기</button>
              </>
          </div>
        </div>
      )}
    </div>
  );
}

function Recipes({ recipes, setRecipes, ingTags, setIngTags, cookTags, setCookTags, notify }) {
  const [view, setView] = useState("list");
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState({ name:"", ingredients:"", ingTag:"", cookTag:"", memo:"" });
  const [aiLoading, setAiLoading] = useState(false);
  const [newIng, setNewIng] = useState("");
  const [newCook, setNewCook] = useState("");
  const [search, setSearch] = useState("");

  const reset = () => setForm({ name:"", ingredients:"", ingTag:"", cookTag:"", memo:"" });

  const autoTag = async () => {
    if (!form.name && !form.ingredients) return notify("이름이나 재료를 먼저 입력해주세요", "error");
    setAiLoading(true);
    const text = await callClaude(`레시피: ${form.name}, 재료: ${form.ingredients}\n재료태그목록: ${ingTags.join(",")}\n조리법태그목록: ${cookTags.join(",")}\n가장 어울리는 각 1개 선택. JSON만: {"ingTag":"태그","cookTag":"태그"}`);
    try {
      const p = JSON.parse(text.replace(/```json|```/g,"").trim());
      setForm(f=>({...f,...p}));
      notify("태그 자동 설정됐어요!");
    } catch { notify("자동 태그 실패", "error"); }
    setAiLoading(false);
  };

  const save = () => {
    if (!form.name.trim()) return notify("레시피 이름을 입력해주세요", "error");
    if (sel !== null) { setRecipes(p=>p.map((r,i)=>i===sel?{...form}:r)); notify("수정됐어요!"); }
    else { setRecipes(p=>[...p,{...form,id:Date.now()}]); notify("레시피 저장됐어요!"); }
    reset(); setSel(null); setView("list");
  };

  const inp = { width:"100%", padding:"10px 12px", border:"1px solid #ddd", borderRadius:10, fontSize:14, outline:"none", boxSizing:"border-box" };
  const lbl = { display:"block", fontSize:13, fontWeight:600, marginBottom:6, color:"#555" };

  const filtered = recipes.filter(r => r.name.toLowerCase().includes(search.toLowerCase()) || (r.ingTag||"").includes(search) || (r.cookTag||"").includes(search));

  if (view==="add" || view==="edit") return (
    <div style={{ maxWidth:540, margin:"0 auto" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <button onClick={()=>{setView("list");reset();setSel(null);}} style={{ border:"none", background:"transparent", fontSize:14, color:"#666" }}>← 뒤로</button>
        <h2 style={{ fontSize:18, fontWeight:800 }}>{view==="edit"?"레시피 수정":"새 레시피"}</h2>
        <div style={{width:40}}></div>
      </div>

      {[["name","레시피 이름","예: 된장찌개",false],["ingredients","재료","두부, 된장, 애호박...",true],["memo","메모","팁이나 변형 아이디어...",false]].map(([k,l,ph,isTA])=>(
        <div key={k} style={{marginBottom:14}}>
          <label style={lbl}>{l}</label>
          {isTA
            ? <textarea style={{...inp,resize:"vertical"}} rows={k==="steps"?4:3} value={form[k]} placeholder={ph} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} />
            : <input style={inp} value={form[k]} placeholder={ph} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} />
          }
        </div>
      ))}



      {[[ingTags,setIngTags,"ingTag","재료 태그",newIng,setNewIng],[cookTags,setCookTags,"cookTag","조리법 태그",newCook,setNewCook]].map(([tags,setTags,k,l,nv,setNv])=>(
        <div key={k} style={{marginBottom:14}}>
          <label style={lbl}>{l}</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {tags.map(t=>(
              <div key={t} style={{display:"flex",alignItems:"center",gap:2}}>
                <input
                  defaultValue={t}
                  onFocus={()=>setForm(f=>({...f,[k]:t}))}
                  onBlur={e=>{ const newVal=e.target.value.trim(); if(newVal&&newVal!==t){ setTags(p=>p.map(x=>x===t?newVal:x)); setForm(f=>({...f,[k]:newVal})); }}}
                  onKeyDown={e=>{ if(e.key==="Enter") e.target.blur(); }}
                  style={{padding:"5px 12px",border:"1px solid #ddd",borderRadius:"20px 0 0 20px",fontSize:12,background:form[k]===t?"#1a1a1a":"#fff",color:form[k]===t?"#fff":"#1a1a1a",outline:"none",width:`${Math.max(t.length*14,40)}px`,textAlign:"center",cursor:"text"}}
                />
                <button onClick={()=>{ setTags(p=>p.filter(x=>x!==t)); if(form[k]===t) setForm(f=>({...f,[k]:""})); }} style={{padding:"5px 7px",border:"1px solid #ddd",borderLeft:"none",borderRadius:"0 20px 20px 0",fontSize:11,background:"#fff",color:"#aaa"}}>×</button>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6}}>
            <input style={{flex:1,padding:"6px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,outline:"none"}} value={nv} placeholder={`새 ${l}`} onChange={e=>setNv(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nv.trim()){setTags(p=>[...p,nv.trim()]);setNv("");}}} />
            <button onClick={()=>{if(nv.trim()){setTags(p=>[...p,nv.trim()]);setNv("");}}} style={{padding:"6px 12px",background:"#f0f0f0",border:"none",borderRadius:8,fontSize:13}}>추가</button>
          </div>
        </div>
      ))}

      <button onClick={save} style={{width:"100%",padding:14,background:"#1a1a1a",color:"#fff",border:"none",borderRadius:12,fontSize:16,fontWeight:700,marginTop:8}}>💾 저장</button>
    </div>
  );

  if (view==="detail" && sel!==null) {
    const r = recipes[sel];
    return (
      <div style={{maxWidth:540,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <button onClick={()=>setView("list")} style={{border:"none",background:"transparent",fontSize:14,color:"#666"}}>← 뒤로</button>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setForm(r);setView("edit");}} style={{padding:"6px 12px",border:"1px solid #ddd",borderRadius:8,background:"#fff",fontSize:13}}>✏️ 수정</button>
            <button onClick={()=>{setRecipes(p=>p.filter((_,i)=>i!==sel));notify("삭제됐어요");setView("list");}} style={{padding:"6px 12px",border:"1px solid #fca5a5",borderRadius:8,background:"#fff",fontSize:13,color:"#ef4444"}}>🗑 삭제</button>
          </div>
        </div>
        <h2 style={{fontSize:22,fontWeight:800,marginBottom:10}}>{r.name}</h2>
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {r.ingTag && <Tag label={r.ingTag} color="green" />}
          {r.cookTag && <Tag label={r.cookTag} color="blue" />}
        </div>
        {r.ingredients && <><div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:6}}>🥕 재료</div><p style={{fontSize:15,lineHeight:1.7,marginBottom:16,whiteSpace:"pre-wrap"}}>{r.ingredients}</p></>}
        
        {r.memo && <><div style={{fontSize:13,fontWeight:700,color:"#888",marginBottom:6}}>💡 메모</div><p style={{fontSize:15,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{r.memo}</p></>}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <input style={{flex:1,padding:"10px 14px",borderRadius:10,border:"1px solid #ddd",fontSize:14,outline:"none"}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 레시피 검색..." />
        <button onClick={()=>{reset();setView("add");}} style={{padding:"10px 16px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600,whiteSpace:"nowrap"}}>+ 새 레시피</button>
      </div>
      {filtered.length===0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",color:"#aaa"}}>
          <div style={{fontSize:48,marginBottom:12}}>📖</div>
          <p>레시피가 없어요.<br/>첫 레시피를 추가해보세요!</p>
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>
          {filtered.map((r,i)=>(
            <div key={i} onClick={()=>{setSel(i);setView("detail");}} style={{background:"#fff",borderRadius:12,padding:16,cursor:"pointer",border:"1px solid #eee"}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>{r.name}</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                {r.ingTag && <Tag label={r.ingTag} color="green" />}
                {r.cookTag && <Tag label={r.cookTag} color="blue" />}
              </div>
              {r.memo && <div style={{fontSize:12,color:"#888"}}>{r.memo}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Fridge({ fridge, setFridge, notify }) {
  const [input, setInput] = useState("");
  const add = () => {
    const items = input.split(/[,，\s]+/).map(s=>s.trim()).filter(Boolean);
    if (!items.length) return;
    setFridge(p=>[...new Set([...p,...items])]);
    setInput(""); notify(`${items.join(", ")} 추가됐어요!`);
  };
  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:16}}>🧊 냉장고 재료</h2>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <input style={{flex:1,padding:"10px 12px",border:"1px solid #ddd",borderRadius:10,fontSize:14,outline:"none"}} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="재료 입력 (쉼표나 띄어쓰기로 여러 개)" />
        <button onClick={add} style={{padding:"10px 16px",background:"#1a1a1a",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:600}}>추가</button>
      </div>
      {fridge.length===0 ? (
        <div style={{textAlign:"center",padding:"60px 20px",color:"#aaa"}}>
          <div style={{fontSize:48,marginBottom:12}}>🧊</div><p>냉장고가 비어있어요!</p>
        </div>
      ) : (
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {fridge.map(item=>(
            <div key={item} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:"#fff",border:"1px solid #e5e5e5",borderRadius:20,fontSize:14}}>
              <span>{item}</span>
              <button onClick={()=>setFridge(p=>p.filter(i=>i!==item))} style={{border:"none",background:"transparent",fontSize:16,color:"#aaa",lineHeight:1,padding:0}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
